name: LinkedIn Terraform Tips — Daily Poster

on:
  # Run every day at 8:30 AM UTC
  schedule:
    - cron: "30 8 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      command:
        description: "Command to run"
        required: true
        default: "run"
        type: choice
        options: [run, generate, schedule, report]
      dry_run:
        description: "Dry run (no actual posting)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  post-tip:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # Allow workflow to update state files and logs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output directories
        run: mkdir -p state output

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          OPENAI_MODEL: gpt-4o
          POST_INTERVAL_DAYS: "1"         
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py ${{ github.event.inputs.command || 'run' }}

      - name: Commit updated state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/pipeline_state.json state/analytics.json
          git diff --staged --quiet || git commit -m "chore: update pipeline state after day run [skip ci]"
          git push

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_number }}
          path: output/pipeline.log
          retention-days: 30

      - name: Upload analytics report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analytics-${{ github.run_number }}
          path: output/analytics_report.md
          retention-days: 30
